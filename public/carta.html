<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description"
    content="Carta digital de Mis Raízes - Cocina Peruana. Descubre nuestros auténticos platos peruanos.">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;900&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f9d406",
            "background-light": "#f8f8f5",
            "background-dark": "#0a0a08",
          },
          fontFamily: {
            "display": ["Work Sans", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .bg-background-dark { background-color: #0a0a08; }
    }
  </style>
  <title>Carta | Mis Raízes - Cocina Peruana</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="img/logo.jpg">
</head>

<body>

  <!-- Floating Back Button -->
  <a href="index.html"
    class="fixed bottom-6 right-6 z-[300] bg-background-dark/80 backdrop-blur-md border border-primary/20 text-primary px-5 py-2 rounded-full shadow-lg hover:bg-primary hover:text-background-dark transition-all flex items-center justify-center group font-bold tracking-widest text-sm uppercase"
    aria-label="Volver al inicio">
    <span class="group-hover:-translate-x-1 transition-transform inline-block mr-1"></span>INICIO
  </a>

  <!-- Animated Logo Header -->
  <header class="header">
    <div class="logo-container">
      <a href="index.html">
        <img src="img/Logo.webp" alt="Mis Raízes" class="logo">
      </a>
    </div>
    <div class="header-divider">
      <div class="line"></div>
      <div class="diamond"></div>
      <div class="line"></div>
    </div>
    <p class="header-subtitle">Cocina Peruana de Tradición</p>
  </header>

  <!-- Category Navigation -->
  <nav class="category-nav" id="categoryNav">
    <div class="nav-scroll" id="navScroll">
      <!-- Generated dynamically -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="menuContent">
    <h1 class="sr-only">Carta - Mis Raízes Restaurante Peruano</h1>
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p class="loading-text">Cargando carta...</p>
    </div>
  </main>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Volver arriba">↑</button>

  <!-- Weekly Menu Modal -->
  <div class="weekly-modal" id="weeklyModal" style="display:none;">
    <div class="weekly-modal-content">
      <button class="weekly-modal-close" onclick="closeWeeklyModal()">✕</button>
      <div class="weekly-menu-container">
        <img src="img/Menu.webp" alt="Menú del Día" class="menu-bg" loading="lazy">
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer flex flex-col items-center gap-4">
    <div>
      <p class="footer-text">Mis Raízes · Cocina Peruana</p>
      <p class="footer-iva">IVA incluido en todos los precios</p>
    </div>
    <p
      class="text-primary/60 text-[10px] sm:text-xs lowercase tracking-wider flex flex-wrap justify-center gap-x-2 gap-y-1 mt-4">
      <a href="aviso-legal.html" class="hover:underline hover:text-primary transition-colors whitespace-nowrap">aviso
        legal</a> <span class="text-slate-600">|</span>
      <a href="politica-privacidad.html"
        class="hover:underline hover:text-primary transition-colors whitespace-nowrap">privacidad</a> <span
        class="text-slate-600">|</span>
      <a href="politica-cookies.html"
        class="hover:underline hover:text-primary transition-colors whitespace-nowrap">cookies</a>
    </p>
  </footer>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/cookie-consent.js" defer></script>
  <script src="js/miercoles.js" defer></script>
</body>

</html>
