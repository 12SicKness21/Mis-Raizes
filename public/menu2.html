<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Menú del Día - Mis Raízes Cocina Peruana">
    <meta name="theme-color" content="#0a0a0a">
    <title>Menú del Día | Mis Raízes</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/img/logo.jpg">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
        }

        .weekly-menu-section {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .weekly-menu-container {
            max-width: 600px;
            height: 100%;
            border-radius: 0;
            border: none;
            box-shadow: none;
            display: flex;
            align-items: center;
        }

        .menu-bg {
            height: 100%;
            width: auto;
            max-width: none;
        }

        @media (max-width: 600px) {
            .weekly-menu-container {
                max-width: 100%;
                width: 100%;
            }

            .menu-bg {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <section class="weekly-menu-section" id="weeklyMenu">
        <div class="weekly-menu-container">
            <img src="/img/Menu.webp" alt="Menú del Día" class="menu-bg">
            <div class="menu-overlay">
                <div></div>
                <div></div>
                <div></div>
                <div class="menu-column primeros">

                    <ul id="list-primeros"></ul>
                </div>
                <div class="menu-column segundos">
                    <ul id="list-segundos"></ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/menu2.js"></script>
</body>

</html>
